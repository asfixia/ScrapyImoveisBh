# One service per crawler; JSON files land in ./output (timestamp + site name).
# Build once:  docker compose build
# Run one:    docker compose run --rm netimoveis
# Run all:    docker compose run --rm netimoveis && docker compose run --rm vivareal ...

x-crawler: &crawler
  build: .
  environment:
    SCRAPE_OUTPUT_DIR: /data
  volumes:
    - ./output:/data

services:
  netimoveis:
    <<: *crawler
    command: ["netimoveis"]

  vivareal:
    <<: *crawler
    command: ["vivareal"]

  quintoandar:
    <<: *crawler
    command: ["quintoandar"]

  casamineira:
    <<: *crawler
    command: ["casamineira"]

  zap:
    <<: *crawler
    command: ["zap"]
