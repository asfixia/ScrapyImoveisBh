# Single container: runs all Scrapy spiders + Python crawlers + merge (main_update_data.py).
#
# Rebuild image only when requirements.txt changes:
#   docker compose build
#
# App code is bind-mounted — edit locally and re-run without rebuild:
#   docker compose up
#
# JSON outputs and merged files: ./output → /data
# Per-job logs: ./logs → /app/logs

services:
  update-data:
    init: true
    build:
      context: .
      dockerfile: docker/Dockerfile
    environment:
      SCRAPE_OUTPUT_DIR: /data
      PYTHONUNBUFFERED: "1"
      # Crawl subset only (comma/semicolon; case-insensitive). Omit = run all.
      # CRAWL_LABELS: NetImoveis,VivaReal,QuintoAndar,CasaMineira,ZapImoveis
      # Optional: copy imoveis_unificados_minified.json to extra paths (comma or semicolon)
      # MERGED_FILE_MINIFIED: /var/www/html/fitrabit/data/imoveis_unificados.json \\recalcards.com\web_html\fitrabit\data\imoveis_unificados.json,/var/www/html/fitrabit/data/imoveis_unificados.json
      # Optional: pipeline/upload_to_db.py (after merge) — omit paths to auto-use latest file per site in /data
      # IMOVEIS_UPLOAD_DSN: postgresql://user:pass@host:5432/dbname
      # IMOVEIS_UPLOAD_QUINTOANDAR: /data/2026-05-31_12-00_quintoandar.json
      # IMOVEIS_UPLOAD_CASAMINEIRA: /data/2026-05-31_12-00_casamineira.json
      # IMOVEIS_UPLOAD_NETIMOVEIS: /data/2026-05-31_12-00_netimoveis.json
      # IMOVEIS_UPLOAD_VIVAREAL: /data/2026-05-31_12-00_vivareal.json
      # IMOVEIS_UPLOAD_ZAPIMOVEIS: /data/2026-05-31_12-00_zapimoveis.json
      # IMOVEIS_UPLOAD_TRUNCATE_BEFORE: "1"
      # IMOVEIS_UPLOAD_NO_MERGE: "0"
    volumes:
      - ./main_update_data.py:/app/main_update_data.py
      - ./scrapy.cfg:/app/scrapy.cfg
      - ./pipeline:/app/pipeline
      - ./ImoveisScrapy:/app/ImoveisScrapy
      - ./docker:/app/docker
      - ./output:/data
      - ./logs:/app/logs
