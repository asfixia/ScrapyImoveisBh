# Single container: runs all Scrapy spiders + Python crawlers + merge (main_update_data.py).
#
#   docker compose build
#   docker compose run --rm update-data
#
# JSON outputs and merged files: ./output → /data
# Per-job logs: ./logs → /app/logs

services:
  update-data:
    build:
      context: .
      dockerfile: docker/Dockerfile
    environment:
      SCRAPE_OUTPUT_DIR: /data
      # Optional: copy imoveis_unificados_minified.json to extra paths (comma or semicolon)
      # MERGED_FILE_MINIFIED: /var/www/html/fitrabit/data/imoveis_unificados.json \\recalcards.com\web_html\fitrabit\data\imoveis_unificados.json,/var/www/html/fitrabit/data/imoveis_unificados.json
    volumes:
      - ./output:/data
      - ./logs:/app/logs
